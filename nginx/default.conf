server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enhanced Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), speaker=(), vibrate=(), fullscreen=(self)" always;

    # Hide Nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=content:10m rate=30r/s;

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        
        # Apply rate limiting
        limit_req zone=api burst=20 nodelay;
        
        # Additional security headers for HTML
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Enhanced content protection with rate limiting
    location /content/ {
        # Apply content rate limiting
        limit_req zone=content burst=50 nodelay;
        
        # Block if no X-Requested-With header (direct browser navigation)
        if ($http_x_requested_with = '') {
            return 403;
        }
        
        # Block suspicious user agents
        if ($http_user_agent ~* (curl|wget|python|java|go-http|libwww)) {
            return 403;
        }
        
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'none';" always;
        
        # No caching for dynamic content
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Never cache config.js - runtime env injection
    location = /config.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header CDN-Cache-Control "no-store";
        add_header Cloudflare-CDN-Cache-Control "no-store";
        add_header Content-Security-Policy "script-src 'none';" always;
    }

    # Cache static assets with security headers
    location ~* \.(?:js|css|woff|woff2|ttf|otf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache images with security headers
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache PDFs with security headers
    location ~* \.pdf$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; object-src 'self';" always;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block access to backup files
    location ~ \.(bak|backup|old|tmp|temp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block access to version control
    location ~ /\.(git|svn|hg) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Custom error pages
    error_page 403 /403.html;
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
