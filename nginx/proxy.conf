# ============================
# 🔄 Nginx Reverse Proxy Config
# ============================
# Cấu hình này dùng để proxy từ nginx host vào Docker container cygnussec-web

upstream cygnussec_backend {
    # Container name từ docker-compose
    server cygnussec-web:8080;
    
    # Keepalive connections
    keepalive 32;
}

# ============================
# 🔒 HTTPS Server (Port 443)
# ============================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cygnussec.com www.cygnussec.com;

    # SSL Certificate paths
    ssl_certificate /etc/nginx/ssl/cygnussec.com.crt;
    ssl_certificate_key /etc/nginx/ssl/cygnussec.com.key;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Logging
    access_log /var/log/nginx/cygnussec-access.log;
    error_log /var/log/nginx/cygnussec-error.log;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-Proxy-By "Nginx-Reverse-Proxy" always;

    # Client body size limit
    client_max_body_size 10M;

    # Proxy to Docker container
    location / {
        proxy_pass http://cygnussec_backend;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (nếu cần)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Không cache
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://cygnussec_backend/;
        proxy_set_header Host $host;
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================
# � HTTP to HTTPS Redirect
# ============================
server {
    listen 80;
    listen [::]:80;
    server_name cygnussec.com www.cygnussec.com;
    
    # Logging
    access_log /var/log/nginx/cygnussec-redirect.log;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}
